name: Evaluate PR & Update Leaderboard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout PR code (this includes submission file)
      - name: Checkout PR code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install pandas

      # 4. Run evaluation
      - name: Run evaluation
        run: python evaluate.py

      # 5. Commit updated leaderboard
      - name: Commit leaderboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add leaderboard.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update leaderboard from PR #${{ github.event.number }}"
            git push origin HEAD:main
          fi
